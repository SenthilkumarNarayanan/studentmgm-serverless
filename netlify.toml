[build]
  base = "student-management-system"
  command = "npm run build:prod"

  # TEMP: keep your current path since you have browser/browser
  # (later fix Angular to remove duplicate folder)
  publish = "dist/student-management-system/browser/browser"

[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_PRODUCTION = "false"

[context.production]
  command = "npm run build:prod"

  [context.production.environment]
    NODE_ENV = "production"

# =========================
# 🔥 REDIRECTS (VERY IMPORTANT ORDER)
# =========================

# ✅ API Routes FIRST
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# ✅ Health check
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

# ✅ Angular SPA fallback (ONLY ONCE, MUST BE LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =========================
# 🔧 FUNCTIONS CONFIG
# =========================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

  included_files = [
    "backend/**/*.js",
    "backend/**/*.json",
    "backend/**/*.env"
  ]

  external_node_modules = [
    "express",
    "mongoose",
    "bcryptjs",
    "jsonwebtoken",
    "cors",
    "dotenv",
    "nodemailer"
  ]