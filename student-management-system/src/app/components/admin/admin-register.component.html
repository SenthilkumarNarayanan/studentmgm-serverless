<div class="register-container">
  <div class="register-card">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock fs-1" style="color: #4361ee;"></i>
      <h3 class="mt-2">Admin Registration</h3>
      <p class="text-muted">Create a new admin account</p>
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" [(ngModel)]="name" 
               name="name" required placeholder="Enter your full name">
      </div>
      
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" [(ngModel)]="email" 
               name="email" required placeholder="admin@example.com">
      </div>
      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" 
               name="password" required placeholder="Create a strong password">
        <div class="form-text">Password must be at least 6 characters</div>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" [(ngModel)]="confirmPassword" 
               name="confirmPassword" required placeholder="Confirm your password">
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i class="bi bi-person-plus"></i> Register Admin
      </button>
      
      <div *ngIf="error" class="alert alert-danger mt-3">
        <i class="bi bi-exclamation-triangle"></i> {{ error }}
      </div>
      
      <div *ngIf="success" class="alert alert-success mt-3">
        <i class="bi bi-check-circle"></i> {{ success }}
      </div>
      
      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </form>
    
    <hr class="my-4">
    
    <div class="text-center">
      <p class="text-muted small mb-0">
        <i class="bi bi-info-circle"></i> 
        First admin account can be created here. After registration, use the credentials to login.
      </p>
    </div>
  </div>
</div>
