<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard fs-1" style="color: #4361ee;"></i>
      <h3 class="mt-2">Student Management System</h3>
      <p class="text-muted">Login to your account</p>
    </div>
    
    <!-- Tab Navigation -->
    <div class="nav nav-tabs mb-4">
      <div class="nav-item">
        <a class="nav-link" [class.active]="role === 'admin'" (click)="switchRole('admin')" href="javascript:void(0)">
          <i class="bi bi-shield-lock"></i> Admin Login
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" [class.active]="role === 'student'" (click)="switchRole('student')" href="javascript:void(0)">
          <i class="bi bi-person"></i> Student Login
        </a>
      </div>
    </div>
    
    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" 
               class="form-control" 
               [(ngModel)]="email" 
               name="email" 
               placeholder="Enter your email"
               autocomplete="email" 
               required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" 
               class="form-control" 
               [(ngModel)]="password" 
               name="password" 
               placeholder="Enter your password"
               autocomplete="current-password" 
               required>
      </div>

      
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i class="bi bi-box-arrow-in-right me-2" *ngIf="!loading"></i>
        Login as {{ role === 'admin' ? 'Admin' : 'Student' }}
      </button>
      <div *ngIf="error" class="alert alert-danger mt-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        {{ error }}
      </div>
    </form>
    
    <!-- Admin Registration Link -->
    <div class="text-center mt-3" *ngIf="role === 'admin'">
      <p class="mb-0">
        Don't have an admin account? 
        <a routerLink="/admin/register" class="text-decoration-none fw-bold">
          Register here
        </a>
      </p>
    </div>
    
    <!-- Student Registration Link -->
    <div class="text-center mt-3" *ngIf="role === 'student'">
      <p class="mb-0">
        Don't have a student account? 
        <a routerLink="/student/register" class="text-decoration-none fw-bold">
          Register here
        </a>
      </p>
      <p class="text-muted small mt-2">
        <i class="bi bi-info-circle"></i>
        You need a Registration Number provided by the admin to register.
      </p>
    </div>
  </div>
</div>
